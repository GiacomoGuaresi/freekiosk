name: Sync Wiki

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate wiki source
        run: |
          if [ ! -d "wiki" ]; then
            echo "Missing wiki/ folder in repository root"
            exit 1
          fi

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Sync files to wiki repository
        run: |
          rsync -av --delete --exclude='.git/' wiki/ wiki-repo/

      - name: Commit and push changes
        working-directory: wiki-repo
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No wiki changes to publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "docs(wiki): sync from main (${GITHUB_SHA::7})"
          git push
